<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="zhishi：本地优先的结构化客观事实知识库。">
    <meta name="theme-color" content="#0d0d0d">
    <title>zhishi · 本地知识库</title>
    <link rel="stylesheet" href="css/style.css?v=11">
    <script src="js/vendor/d3.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "./js/api.js": "./js/api.js?v=11",
          "./js/app.js": "./js/app.js?v=11",
          "./js/exporter.js": "./js/exporter.js?v=11",
          "./js/generator.js": "./js/generator.js?v=11",
          "./js/prompt.js": "./js/prompt.js?v=11",
          "./js/settings.js": "./js/settings.js?v=11",
          "./js/settings-store.js": "./js/settings-store.js?v=11",
          "./js/settings-ui.js": "./js/settings-ui.js?v=11",
          "./js/storage.js": "./js/storage.js?v=11",
          "./js/ui.js": "./js/ui.js?v=11",
          "./js/ui-cards.js": "./js/ui-cards.js?v=11",
          "./js/ui-stats.js": "./js/ui-stats.js?v=11",
          "./js/ui-tabs.js": "./js/ui-tabs.js?v=11",
          "./js/ui-graph.js": "./js/ui-graph.js?v=11",
          "./js/validator.js": "./js/validator.js?v=11"
        }
      }
    </script>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div class="brand">
          <h1 class="brand__title">zhishi</h1>
          <span class="brand__subtitle">本地结构化事实库</span>
          <span class="brand__status" aria-live="polite">
            <span id="status-dot" data-status="idle" aria-hidden="true"></span>
            <span id="status-text" data-status="idle">正在初始化…</span>
          </span>
        </div>

        <div class="toolbar" aria-label="知识库工具">
          <div class="search-control">
            <input
              id="search-input"
              type="search"
              placeholder="搜索事实、来源或子分类"
              aria-label="搜索事实"
              autocomplete="off"
              spellcheck="false"
            >
          </div>

          <button id="export-json" class="button" type="button">导出 JSON</button>
          <button id="export-markdown" class="button" type="button">导出 Markdown</button>
          <button
            id="settings-toggle"
            class="icon-button"
            type="button"
            aria-label="打开设置"
            aria-expanded="false"
            aria-controls="settings-panel"
          ></button>
        </div>
      </div>
    </header>

    <main class="app-shell">
      <nav class="tab-bar" aria-label="事实分类导航">
        <button class="tab-item active" type="button" data-tab="all">全部</button>
        <button class="tab-item" type="button" data-tab="graph">图谱</button>
      </nav>

      <div class="subtab-bar" id="subtab-bar" aria-label="子类筛选"></div>

      <section class="stats-panel" id="stats-panel" aria-label="知识库统计">
        <span id="stats-total">共 0 条事实</span>
        <div id="category-stats" aria-live="polite"></div>
      </section>

      <section aria-label="事实卡片流">
        <div id="facts-grid" aria-live="polite" aria-busy="false">
          <p class="facts-empty">正在初始化本地知识库…</p>
        </div>
        <div id="graph-container" hidden>
          <svg id="graph-svg" width="100%" height="100%"></svg>
        </div>
      </section>
    </main>

    <div id="settings-panel-host"></div>

    <script type="module" src="js/app.js?v=11"></script>
  </body>
</html>
